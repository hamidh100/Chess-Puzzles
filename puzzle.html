<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Puzzle Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="container">

    <h2 id="puzzle-title"></h2>

    <div id="puzzle-box">
        <img id="puzzle-img" src="">
    </div>

    <button id="solution-btn">Show Solution</button>

    <div id="solution-box" class="hidden">
        <img id="solution-img" src="">
        <button id="back-btn">Back to Puzzle</button>
    </div>

    <div class="nav">
        <button id="minus10">-10</button>
        <button id="minus1">-1</button>

        <button id="plus1">+1</button>
        <button id="plus10">+10</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
